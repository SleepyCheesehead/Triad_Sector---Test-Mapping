- type: constructionGraph
  id: GasTrinary
  start: start
  graph:
  - node: start
    edges:
    # Filter
    - to: filter
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: filterflipped
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    # Goobstation
    - to: inline_filter
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    # Mixer
    - to: mixer
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: mixerflipped
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: pneumaticvalve
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    # Triad: alt-layer variants for RPD cursor-quadrant placement (see alt_layers.yml).
    - to: filterAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: filterAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: filterflippedAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: filterflippedAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: mixerAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: mixerAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: mixerflippedAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: mixerflippedAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: pneumaticvalveAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: pneumaticvalveAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
    # End Triad

  # Filter
  - node: filter
    entity: GasFilter
    edges:
    - to: start
      conditions:
      - !type:EntityAnchored
        anchored: false
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 2
      - !type:DeleteEntity
      steps:
      - tool: Welding
        doAfter: 1

  - node: filterflipped
