- type: trait
  id: SiikMaas
  name: trait-language-SiikMaas-name
  description: trait-language-SiikMaas-desc
  category: LanguageTraits
  cost: 1
  effects:
  - !type:AddCompsEffect
    components:
    - type: LanguageSpeaker
  - !type:AddLanguagesEffect
    understood: true
    spoken: true
    languages:
    - SiikMaas

