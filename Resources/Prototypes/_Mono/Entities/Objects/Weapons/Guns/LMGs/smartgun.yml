- type: entity
  name: SKR-WS MLA-79 smart LMG (.160 smart)
  parent: [BaseWeaponLightMachineGun, BaseGunWieldable]
  id: WeaponSmartLmg
  description: A military prototype that saw rare use in front-lines field testing. This is a refined version for standard production.
  components:
  # Triad: Removed GunWieldBonus and SpeedModifiedOnWield so harness support controls the MLA-79 bonuses. ReqWeapHarn below restores accuracy and movement behavior through the powered harness.
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/SmartGuns/ml79a.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    minAngle: 27
    maxAngle: 73
    angleIncrease: 2
    angleDecay: 22
    fireRate: 9.5
    cameraRecoilScalar: 0
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/m41.ogg
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineSmartLMG
        insertSound: /Audio/Weapons/Guns/MagIn/sfrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/hpistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineSmartLMG
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeSmart
        priority: 1
        whitelist:
          tags:
          - CartridgeSmart
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/SmartGuns/ml79a.rsi
  - type: StaticPrice
    price: 50000
    vendPrice: 50000
  # Triad: The MLA-79 must still be wielded to fire; the harness only supplies bonuses.
  - type: GunRequiresWield
  - type: PirateBountyItem
    id: ExperimentalFactionWeapon
  # Triad: Tag implemented for the weapon to be properly identified by powered harnesses.
  - type: Tag
    tags:
    - TriadHeavyWeapon
  - type: SmartGun
    requiresWield: true
  - type: LaserPointer
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/smartgun_mouse.rsi
      state: all
  # Triad: Harness-specific support. Without a powered harness, this weapon keeps base spread and slows the wielder.
  - type: ReqWeapHarn
    supportKey: Mla79Smartgun
    magnetRetrieve:
      tags:
      - TriadHeavyWeapon
    minAngleBonus: -5
    maxAngleBonus: -37
    unsupportedWalkModifier: 0.5
    unsupportedSprintModifier: 0.4
  #Triad: End
