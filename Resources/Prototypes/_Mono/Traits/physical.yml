- type: trait
  id: BionicSpinarette
  name: trait-bionic-spinarette-name
  description: trait-bionic-spinarette-desc
  category: Physical
  cost: 2
  conditions:
  - !type:IsSpeciesCondition
    species: IPC
    invert: true
  - !type:IsSpeciesCondition
    species: Arachnid
    invert: true
  # Triad: restore the BorgChassis exclusion the Real Traits migration dropped (was a component blacklist).
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  # Triad: the spinarette spins silk into the palm, so it needs a hand. Block it only for a DOUBLE arm amputee
  # (both arms gone = no hands); a one-armed character still has a hand and can use it. invert on AllOf =
  # "not (no left arm AND no right arm)".
  - !type:AllOfCondition
    invert: true
    tooltip: trait-condition-needs-an-arm
    conditions:
    - !type:HasTraitCondition
      trait: ArmAmputeeLeft
    - !type:HasTraitCondition
      trait: ArmAmputeeRight
  effects:
  - !type:AddCompsEffect
    components:
    - type: Sericulture
      action: ActionSericulture
      productionLength: 2
      entityProduced: MaterialWebSilk1
      hungerCost: 4

- type: trait
  id: Feeble
  name: trait-feeble-name
  description: trait-feeble-desc
  category: Physical
  cost: -4
  conditions:
  - !type:HasTraitCondition
    trait: Steadfast
    invert: true
  - !type:IsSpeciesCondition
    species: Felinid
    invert: true
  - !type:IsSpeciesCondition
    species: Tajaran
    invert: true
  effects:
  # Triad: SlowOnDamage is already on the base mob, so AddCompsEffect (removeExisting:false) would skip these
  # and Feeble would do nothing. Overwrite replaces the base 60/80 thresholds with these harsher ones.
  - !type:OverwriteCompsEffect
    components:
    - type: SlowOnDamage
      speedModifierThresholds:
        "45": 0.70
        "65": 0.46

