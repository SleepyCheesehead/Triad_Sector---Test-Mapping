- type: entity
  parent: [BaseItem, RecyclableItemDeviceSmall] # Frontier: added RecyclableItemDeviceSmall
  id: SprayPainter
  name: spray painter
  description: A spray painter for painting airlocks, pipes, and other items. # Upstream#37341
  components:
  - type: Sprite
    sprite: Objects/Tools/spray_painter.rsi
    state: spray_painter
  - type: Item
    sprite: Objects/Tools/spray_painter.rsi
  - type: ActivatableUI
    key: enum.SprayPainterUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SprayPainterUiKey.Key:
        type: SprayPainterBoundUserInterface
  - type: SprayPainter
    colorPalette:
      # Triad
      # Virnazush moved existing spray painter colors to here.
      waste: '#990000'
      distro: '#0055cc'
      air: '#03fcd3'
      mix: '#947507'
      red: '#FF1212FF'
      yellow: '#B3A234FF'
      brown: '#947507FF'
      green: '#3AB334FF'
      cyan: '#03FCD3FF'
      blue: '#0335FCFF'
      white: '#FFFFFFFF'
      black: '#333333FF'
      # Virnazush added more colors to make the spray painter more useful.
      external: '#9955cc' 
      oxygen: '#0335FCFF'
      nitrogen: '#ba0000'
      carbon dioxide: '#525252'
      water vapor: '#969696'
      plasma: '#FF00FF' 
      tritium: '#7DC855'
      bz: '#d7bdb4'
      frezon: '#87CEEB'
      healium: '#0FFF50'
      nitrium: '#F1DD38'
      pluoxium: '#4682B4'
      ammonia: '#800080'
      nitrous oxide: '#FF4040'
      bright yellow: '#FFFF00'
      orange: '#FFA500'
      dark brown: '#8B4513'
      coral: '#FF7F50'
      dark green: '#006400'
      purple: '#800080'
      dark purple: '#4B0082'
      pink: '#FFC0CB'
      violet: '#EE82EE' 
      # End Triad
  - type: StaticPrice
    price: 20 # Frontier 40<20
  - type: LimitedCharges # Upstream#37341
    maxCharges: 75 # Triad, change capacity
    lastCharges: 75 # Triad, change capacity
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

# Upstream#37341
- type: entity
  parent: SprayPainter
  id: SprayPainterRecharging
  suffix: Admeme
  components:
  - type: AutoRecharge
    rechargeDuration: 1

- type: entity
  parent: SprayPainter
  id: SprayPainterEmpty
  suffix: Empty
  components:
  - type: LimitedCharges
    lastCharges: -1

- type: entity
  parent: BaseItem
  id: SprayPainterAmmo
  name: compressed paint
  description: A cartridge of highly compressed paint, commonly used in spray painters.
  components:
  - type: SprayPainterAmmo
    charges: 75 # Triad, change capacity
  - type: Sprite
    sprite: Objects/Tools/spray_painter.rsi
    state: ammo
  - type: Item
    sprite: Objects/Tools/spray_painter.rsi
    heldPrefix: ammo
  - type: PhysicalComposition
    materialComposition:
      Steel: 10
      Plastic: 10
  - type: StaticPrice
    price: 30
# End Upstream#37341
