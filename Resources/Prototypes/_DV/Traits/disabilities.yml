## If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

- type: trait
  id: Blindness
  name: trait-blindness-name
  description: trait-blindness-desc
  category: Disabilities
  cost: 0 # Triad: disabilities are an RP choice, not a point economy. No drawback points to spend on boons.
  conditions:
  - !type:HasTraitCondition
    trait: PoorVision
    invert: true
  - !type:HasTraitCondition
    trait: Deuteranopia
    invert: true
  - !type:HasTraitCondition
    trait: UltraVision
    invert: true
  # - !type:HasTraitCondition
  #   trait: Monochromacy
  #   invert: true
  - !type:HasCompCondition
    component: Blindable
  effects:
  - !type:AddCompsEffect
    components:
    - type: PermanentBlindness
  - !type:SpawnItemInHandEffect
    item: WhiteCane

- type: trait
  id: PoorVision
  name: trait-poor-vision-name
  description: trait-poor-vision-desc
  category: Disabilities
  cost: 0 # Triad: disabilities are RP, not a point economy.
  conditions:
  - !type:HasTraitCondition
    trait: Blindness
    invert: true
  - !type:HasCompCondition
    component: Blindable
  effects:
  - !type:AddCompsEffect
    components:
    - type: PermanentBlindness
      blindness: 4
  - !type:SpawnItemInHandEffect
    item: ClothingEyesGlasses

