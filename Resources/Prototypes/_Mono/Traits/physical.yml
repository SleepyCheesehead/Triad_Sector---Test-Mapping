- type: trait
  id: PrybarProsthetics
  name: trait-prybar-prosthetics-name
  description: trait-prybar-prosthetics-desc
  category: Physical
  cost: 2
  conditions:
  # Triad: the prosthetics replace your arms, so they need an arm to replace. Block only for a DOUBLE arm
  # amputee (both arms gone); a one-armed character still gets the bionic on the remaining arm.
  - !type:AllOfCondition
    invert: true
    tooltip: trait-condition-needs-an-arm
    conditions:
    - !type:HasTraitCondition
      trait: ArmAmputeeLeft
    - !type:HasTraitCondition
      trait: ArmAmputeeRight
  effects:
  - !type:AddCompsEffect
    components:
    - type: PrybarProsthetics

