- type: entity
  id: OrganRatLungs
  parent: OrganHumanLungs
  suffix: "rat"
  components:
  - type: Metabolizer
    metabolizerTypes: [ Rat, Animal ] # Triad start

- type: entity
  id: OrganRatHeart
  parent: OrganAnimalHeart
  suffix: "rat"
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Rat, Animal ] # Triad End
- type: entity
  id: OrganRatStomach
  parent: OrganAnimalStomach
  suffix: "rat"
  components:
  - type: Metabolizer # Triad
    metabolizerTypes: [ Rat, Animal ] # Triad
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Sprite
    state: stomach
