# High Capacity Pistol Magazines
- type: entity
  id: Magazine45_ACPPistolHighCapacityIncendiary
  name: extended pistol magazine (.45 ACP incendiary)
  parent: BaseMagazine45_ACPPistolHighCapacityFMJ
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45_ACPIncendiary
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

