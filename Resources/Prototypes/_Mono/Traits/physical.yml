- type: trait
  id: GlassJaw
  name: trait-glass-jaw-name
  description: trait-glass-jaw-desc
  category: Physical
  cost: -2
  conditions:
  - !type:HasTraitCondition
    trait: Tenacity
    invert: true
  # Triad: Osteogenesis adds a stronger GlassJaw; taking both silently drops one (engine skips
  # duplicate components). They are redundant variants, so make them mutually exclusive.
  - !type:HasTraitCondition
    trait: OsteogenesisImperfecta
    invert: true
  - !type:IsSpeciesCondition
    species: IPC
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: GlassJaw

- type: trait
  id: Tenacity
  name: trait-tenacity-name
  description: trait-tenacity-desc
  category: Physical
  cost: 1
  conditions:
  - !type:HasTraitCondition
    trait: GlassJaw
    invert: true
  - !type:HasTraitCondition
    trait: OsteogenesisImperfecta
    invert: true
  # Triad: Redshirt drops Dead to 100 (base Crit is 100); +5 Crit would put Crit (105) ABOVE Dead, inverting
  # the crit/dead ordering (you die before you can crit). GlassJaw/Osteogenesis only LOWER crit, so they stay safe.
  - !type:HasTraitCondition
    trait: Redshirt
    invert: true
  - !type:IsSpeciesCondition
    species: IPC
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: Tenacity

