# High Capacity Pistol Magazines
- type: entity
  id: Magazine45_magnumPistolHighCapacityIncendiary
  name: extended pistol magazine (.45 magnum incendiary)
  parent: BaseMagazine45_magnumPistolHighCapacityFMJ
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45_magnumIncendiary
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

