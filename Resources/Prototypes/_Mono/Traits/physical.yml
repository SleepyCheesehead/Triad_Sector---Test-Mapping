- type: trait
  id: HardenedLymphocytes
  name: trait-hardened-lymphocytes-name
  description: trait-hardened-lymphocytes-desc
  category: Physical
  cost: 4
  conditions:
    - !type:HasCompCondition
        component: BorgChassis
        invert: true
    - !type:IsSpeciesCondition
        species: IPC
        invert: true
  effects:
  # Triad: own component instead of a 2nd DamageProtectionBuff. Two traits adding the same component
  # silently drop one (engine skips duplicates), which let BionicLegs/Spinarette/etc strip DermalArmor.
  - !type:AddCompsEffect
    components:
    - type: HardenedLymphocytes
      modifiers:
        lymphocytes:
          id: HardenedLymphocytesTrait
          flatReductions:
            Radiation: 1

