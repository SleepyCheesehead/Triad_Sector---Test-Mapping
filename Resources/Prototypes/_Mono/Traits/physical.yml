- type: trait
  id: WillToDie
  name: trait-will-to-die-name
  description: trait-will-to-die-desc
  category: Physical
  cost: -1
  conditions:
  - !type:HasTraitCondition
    trait: WillToLive
    invert: true
  # Triad: Redshirt also adds the WillToDie component; taking both silently drops one. Both are
