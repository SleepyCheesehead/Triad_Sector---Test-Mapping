- type: trait
  id: Redshirt
  name: trait-redshirt-name
  description: trait-redshirt-desc
  category: Physical
  cost: -8
  conditions:
  - !type:IsSpeciesCondition # Mono: no silicon redshirts
    species: IPC
    invert: true
  - !type:HasTraitCondition
    trait: WillToLive
    invert: true
  # Triad: WillToDie also adds the WillToDie component; taking both silently drops one.
  - !type:HasTraitCondition
    trait: WillToDie
    invert: true
  # Triad: Tenacity (+5 Crit) would push Crit (105) above Redshirt's lowered Dead (100), inverting the
  # crit/dead ordering. GlassJaw/Osteogenesis only LOWER crit, so they remain compatible with Redshirt.
  - !type:HasTraitCondition
    trait: Tenacity
    invert: true
  # Triad: restore the BorgChassis exclusion the Real Traits port dropped (was a component blacklist).
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects: # Mono: Add a custom component instead of overriding MobThresholds manually
  - !type:AddCompsEffect
    components:
    - type: WillToDie
      deadDecrease: 100

