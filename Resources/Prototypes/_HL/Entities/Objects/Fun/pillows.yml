- type: entity
  abstract: true #triad  moved abstract to the top
  parent: BaseItem
  id: BasePillow
  components:
  - type: Tag
    tags:
      - Payload
      - ClothMade
  - type: EmitSoundOnCollide
    sound:
      collection: ToyFall
  - type: EmitSoundOnLand
    sound:
      collection: ToyFall
  - type: EmitSoundOnTrigger
    sound:
      collection: ToyFall
  - type: UseDelay
    delay: 1.0
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit:
      collection: ToyFall
    damage:
      types:
        Blunt: 0
    hidden: true
  - type: PhysicalComposition
    materialComposition:
      Cloth: 100
  - type: Food
    requiresSpecialDigestion: true
    useSound:
      collection: ToyFall
    delay: 2
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Fiber
          Quantity: 10
  - type: ContainerContainer
    containers:
      stash: !type:ContainerSlot {}
  - type: Speech
    speechVerb: Default # for pais (In the secret stash)
  - type: SecretStash
    secretStashName: secret-stash-pillow #triad secret stash rename)
    blacklist:
      components:
      - SecretStash # Prevents being able to insert plushies inside each other (infinite plush)!
      - NukeDisk # Could confuse the nukies if they don't know that plushies have a stash.
      tags:
      - QuantumSpinInverter # It will cause issues with the grinder...
      - FakeNukeDisk # So you can't tell if the nuke disk is real or fake depending on if it can be inserted or not.
  - type: ToolOpenable
    openToolQualityNeeded: Slicing
    closeToolQualityNeeded: Slicing # Should probably be stitching or something if that gets added
    name: secret-stash-pillow #Triad (secret stash rename)
  - type: HLPersistOnShipSave # Triad (ship saving here)

- type: entity
  id: PillowLongWhite
  parent: BasePillow
  name: long white pillow
  description: Used for long snoozes. #triad grammar
  components:
  - type: Item
    heldPrefix: whitepillow
  - type: Sprite
    sprite: _HL/Objects/Fun/pillows.rsi
    state: pillow_long_white

