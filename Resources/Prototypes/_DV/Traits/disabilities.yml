- type: trait
  id: PainNumbness
  name: trait-painnumbness-name
  description: trait-painnumbness-desc
  category: Disabilities
  cost: 0 # Triad: disabilities are RP, not a point economy.
  conditions:
  - !type:IsSpeciesCondition
    species: IPC
    invert: true
  # Triad: contradicts SelfAware (precise self-damage readout). Being numb to your injuries can't coexist
  # with an in-head health analyzer.
  - !type:HasTraitCondition
    trait: SelfAware
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: PainNumbness

