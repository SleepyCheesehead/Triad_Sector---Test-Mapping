- type: entity
  parent: RogueSiliconGiftBox
  id: ClothingBackpackDroneLootT1
  name: blackbox data recorder (T1)
  description: Data recorder from a drone. Contains valuable components.
  suffix: Drone Loot
  components:
  - type: RadarBlip
    radarColor: "#FFFF00"
    scale: 1
    requireNoGrid: true
    shape: square
  - type: SpawnItemsOnUse
    items:
    # Money - 30k # removed
    # Triad Start
    # Scrap chunks
    - id: ScrapOre20
      amount: 1
      maxAmount: 2
    - id: ScrapOre10
      amount: 1
    # Material
    - id: SheetPlastitanium10
      amount: 1
    # Parts
    - id: AdvancedCapacitorStockPart
      prob: 0.8
      amount: 1
      maxAmount: 2
    - id: AdvancedMatterBinStockPart
      prob: 0.8
      amount: 1
      maxAmount: 2
    - id: NanoManipulatorStockPart
      prob: 0.8
      amount: 1
      maxAmount: 2
    - id: SpawnDungeonLootPowerCell
      prob: 0.3
    # - id: SpawnDungeonLootPartsEngi #Mono: mostly trash and bloat
    #   amount: 3
    #   prob: 0.25
    # Circuit boards # Triad Cleanup and simplifies loot due to bloat
    # - id: SpawnDungeonLootCircuitBoardEngi
    #   prob: 0.2
    # - id: SpawnDungeonLootCircuitBoardScience
    #   prob: 0.2
    # - id: SpawnDungeonLootCircuitBoardSalvage
    #   prob: 0.2
    - id: SpawnDungeonLootCircuitBoard
      amount: 1
      maxAmount: 3
    # Flatpacks
    - id: SpawnDungeonLootFlatpacks
      prob: 0.1 # Triad
    # rare shard drop even from T1
    # - id: WeaponTurretShardFlatpack 
    #   prob: 0.5
    # Research disk, expected value ~12.5k/drone
    - id: RogueSiliconResearchDisk5000
      amount: 2
    - id: RogueSiliconResearchDisk5000
      prob: 0.3
    # Tech disk
    - id: SpawnLootTechDisksT1
      prob: 0.25 #0.25 < 0.5 
      # Triad End
    sound:
      path: /Audio/Machines/windoor_open.ogg

