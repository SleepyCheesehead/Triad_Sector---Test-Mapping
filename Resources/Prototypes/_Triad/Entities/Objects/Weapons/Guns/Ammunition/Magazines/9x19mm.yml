# High Capacity Pistol Magazines|
- type: entity
  id: Magazine9x19mmPistolHighCapacityIncendiary
  name: extended pistol magazine (9x19mm incendiary)
  parent: BaseMagazine9x19mmPistolHighCapacityFMJ
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge9x19mmIncendiary
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

