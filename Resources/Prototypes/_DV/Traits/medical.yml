## If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

- type: trait
  id: Narcolepsy
  name: trait-narcolepsy-name
  description: trait-narcolepsy-desc
  category: Medical
  cost: 0 # Triad: medical conditions are RP, not a point economy.
  effects:
  - !type:AddCompsEffect
    components:
    - type: Narcolepsy
      timeBetweenIncidents: 300, 600
      durationOfIncident: 10, 30

- type: trait
  id: LightweightDrunk
  name: trait-lightweight-name
  description: trait-lightweight-desc
  category: Medical
  cost: 0 # Triad: medical conditions are RP, not a point economy.
  conditions:
  # Triad: opposite of any alcohol-tolerance trait. AlcoholTolerance already excludes Lightweight from its side;
  # mirror it here, and add LiquorLifeline (its dwarven liver confers the same tolerance).
  - !type:HasTraitCondition
    trait: AlcoholTolerance
    invert: true
  - !type:HasTraitCondition
    trait: LiquorLifeline
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: LightweightDrunk
      boozeStrengthMultiplier: 2

- type: trait
  id: Unrevivable
  name: trait-unrevivable-name
  description: trait-unrevivable-desc
  category: Medical
  cost: 0 # Triad: medical conditions are RP, not a point economy.
  effects:
  - !type:AddCompsEffect
    components:
    - type: Unrevivable

- type: trait
  id: Uncloneable
  name: trait-uncloneable-name
  description: trait-uncloneable-desc
  category: Medical
  cost: 0 # Triad: medical conditions are RP, not a point economy.
  effects:
  - !type:AddCompsEffect
    components:
    - type: Uncloneable

