  - !type:HasTraitCondition
    trait: Redshirt
    invert: true
  - !type:IsSpeciesCondition
    species: IPC
    invert: true
  # Triad: restore the BorgChassis exclusion the Real Traits port dropped (was a component blacklist).
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: WillToDie

- type: trait
  id: Thieving
  name: trait-thieving-name
  description: trait-thieving-desc
  category: Physical
  cost: 3
  conditions:
  - !type:IsSpeciesCondition
    species: Felinid
    invert: true
  # Triad: "deft with your hands" is the opposite of Clumsy; they cancel thematically.
  - !type:HasTraitCondition
    trait: Clumsy
    invert: true
  # Triad: pickpocketing and stripping need a hand. Block only for a DOUBLE arm amputee (no hands).
  - !type:AllOfCondition
    invert: true
    tooltip: trait-condition-needs-an-arm
    conditions:
    - !type:HasTraitCondition
      trait: ArmAmputeeLeft
    - !type:HasTraitCondition
      trait: ArmAmputeeRight
  effects:
  - !type:AddCompsEffect
    components:
    - type: Thieving
      stealthy: false
      timeMultiplier: 0.5
      identifyHidden: true

- type: trait
  id: BionicLegs
  name: trait-bionic-legs-name
  description: trait-bionic-legs-desc
  category: Physical
  cost: 2
  conditions:
  # Triad: contradicts WheelchairBound (LegsParalyzed); faster-on-foot is moot with paralyzed legs.
  - !type:HasTraitCondition
    trait: WheelchairBound
    invert: true
  # Triad: needs a leg to augment. Block only for a DOUBLE leg amputee (both legs gone); one leg is enough.
  - !type:AllOfCondition
    invert: true
    tooltip: trait-condition-needs-a-leg
    conditions:
    - !type:HasTraitCondition
      trait: LegAmputeeLeft
    - !type:HasTraitCondition
      trait: LegAmputeeRight
  effects:
  - !type:AddCompsEffect
    components:
    - type: BionicLegs

