# 1 Cost

- type: trait
  id: BoganAccent
  name: trait-bogan-accent-name
  description: trait-bogan-accent-desc
  category: Accents
  cost: 1 # Triad: dialect accent; 1 from the Accents point pool (one dialect max).
  conditions:
  # Triad: Yowie speak Bogan natively (BaseMobYowie carries BoganAccent), so taking it as a trait is redundant.
  - !type:IsSpeciesCondition
    species: Yowie
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: BoganAccent

