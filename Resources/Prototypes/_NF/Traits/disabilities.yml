- type: trait
  id: Stinky
  name: trait-stinky-name
  description: trait-stinky-desc
  category: Disabilities
  effects:
  - !type:AddCompsEffect
    components:
    - type: StinkyTrait

- type: trait
  id: Clumsy
  name: trait-clumsy-name
  description: trait-clumsy-desc
  category: Disabilities
  effects:
  - !type:AddCompsEffect
    components:
    - type: Clumsy
      gunShootFailDamage:
        types:
          Blunt: 5
          Piercing: 4
        groups:
          Burn: 3

# Upstream
- type: trait
  id: WheelchairBound
  name: trait-wheelchair-bound-name
  description: trait-wheelchair-bound-desc
  category: Disabilities
  conditions:
  # Triad: restore the BorgChassis exclusion the Real Traits port dropped (was a component blacklist).
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: BuckleOnMapInit
      prototype: VehicleWheelchair
    - type: LegsParalyzed
