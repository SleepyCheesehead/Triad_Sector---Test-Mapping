- type: trait
  id: SiikMaas
  name: trait-language-SiikMaas-name
  description: trait-language-SiikMaas-desc
  category: LanguageTraits
  cost: 0 # Triad: languages are free; the category cap is the limit, not points.
  effects:
  - !type:AddCompsEffect
    components:
    - type: LanguageSpeaker
  - !type:AddLanguagesEffect
    understood: true
    spoken: true
    languages:
    - SiikMaas

- type: trait
  id: Foreigner
  name: trait-language-foreigner-name
  description: trait-language-foreigner-desc
  category: LanguageTraits
  cost: 0 # Triad: languages are free; Foreigner pays its way by granting extra language slots, not points.
  # Triad: Foreigner is "you're from elsewhere, so you know other tongues". It raises the LanguageTraits
  # cap by 2 (tune this dial), so a foreigner can pick more languages than a local would.
  grantsCategorySlots:
    LanguageTraits: 2
  effects:
  - !type:AddCompsEffect
    components:
    - type: ForeignerTrait
      baseTranslator: TranslatorForeigner

- type: trait
  id: SignLanguage
  name: trait-language-signlanguage-name
  description: trait-language-signlanguage-desc
  category: LanguageTraits
  cost: 0 # Triad: languages are free; the category cap is the limit, not points.
  conditions:
  # Triad: signing needs hands. Block for a DOUBLE arm amputee (both arms gone = no hands); a one-armed
  # character can still sign. Consistent with the other limb gates (Spinarette, Striking Calluses, etc.).
  - !type:AllOfCondition
    invert: true
    tooltip: trait-condition-needs-an-arm
    conditions:
    - !type:HasTraitCondition
      trait: ArmAmputeeLeft
    - !type:HasTraitCondition
      trait: ArmAmputeeRight
  effects:
  - !type:AddCompsEffect
    components:
    - type: LanguageSpeaker
  - !type:AddLanguagesEffect
    understood: true
    spoken: true
    languages:
    - Sign

